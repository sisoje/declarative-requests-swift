name: DeclarativeRequests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: 'latest'
    - uses: actions/checkout@v5
    - uses: actions/cache@v4
      with:
        path: |
          DerivedData/SourcePackages
          .swiftpm
        key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
        restore-keys: |
          spm-${{ runner.os }}-
    - uses: actions/cache@v4
      with:
        path: DerivedData/Build
        key: build-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Sources/**/*.swift', 'Tests/**/*.swift') }}
        restore-keys: |
          build-${{ runner.os }}-${{ hashFiles('Package.resolved') }}-
          build-${{ runner.os }}-
    - name: Run tests
      run: |
        xcodebuild test \
          -scheme DeclarativeRequests-Package \
          -destination 'platform=macOS' \
          -derivedDataPath DerivedData \
          -resultBundlePath TestResults.xcresult
    - uses: kishikawakatsumi/xcresulttool@v1
      with:
        path: TestResults.xcresult
        show-passed-tests: false
      if: failure()
